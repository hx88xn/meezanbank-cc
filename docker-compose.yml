version: '3.8'

services:
  meezanbank-callcenter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meezanbank-callcenter
    ports:
      - "7000:7000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./recordings:/app/recordings
      - ./pages:/app/pages
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
